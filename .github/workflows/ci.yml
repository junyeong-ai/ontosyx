name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install onnxruntime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.21.1/onnxruntime-linux-x64-1.21.1.tgz
          tar xzf onnxruntime-linux-x64-1.21.1.tgz
          echo "ORT_LIB_LOCATION=$PWD/onnxruntime-linux-x64-1.21.1/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$PWD/onnxruntime-linux-x64-1.21.1/lib" >> $GITHUB_ENV

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install onnxruntime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.21.1/onnxruntime-linux-x64-1.21.1.tgz
          tar xzf onnxruntime-linux-x64-1.21.1.tgz
          echo "ORT_LIB_LOCATION=$PWD/onnxruntime-linux-x64-1.21.1/lib" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$PWD/onnxruntime-linux-x64-1.21.1/lib" >> $GITHUB_ENV

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Build
        run: pnpm build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t ontosyx:ci .

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
